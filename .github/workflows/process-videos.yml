name: Process Videos

on:
  workflow_dispatch:
    inputs:
      upload_mirror:
        description: 'Cloud mirror for MP4 uploads (dropbox, gdrive, both, or none)'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - dropbox
          - gdrive
          - both
      cloud_folder:
        description: 'Destination folder name in cloud storage'
        required: false
        default: 'ProcessedVideos'
        type: string
      upload_telegram:
        description: 'Upload each processed video to Telegram immediately after encoding (requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID secrets)'
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

permissions:
  contents: write

jobs:
  process-videos:
    runs-on: aapt  # Enterprise runner: Ubuntu 24.04 · 64 cores · 256 GB RAM · 2040 GB SSD (no GPU)
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize dashboard
        run: |
          echo "::group::Initialize dashboard"
          cat > /tmp/dashboard.md <<'EOF'
          ## 🎬 Video Processing Dashboard

          ⬜⬜⬜⬜⬜⬜⬜⬜ **0 / 8** — Starting…

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ⏳ Running | Installing… |
          | 📁 Directories | ⏳ Pending | — |
          | ⬇️ Downloads | ⏳ Pending | — |
          | 🎞️ Processing + 📨 Telegram | ⏳ Pending | — |
          | ☁️ Cloud Upload | ⏳ Pending | — |
          | 📦 Packaging | ⏳ Pending | — |
          | 🚀 Release | ⏳ Pending | — |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Install dependencies
        run: |
          PHASE_START=$SECONDS

          echo "::group::apt-get install ffmpeg aria2 zip"
          sudo apt-get update -qq > /dev/null
          sudo apt-get install -y -qq ffmpeg aria2 zip rclone > /dev/null
          echo "Installed: ffmpeg $(ffmpeg -version 2>/dev/null | head -1 | awk '{print $3}'), aria2 $(aria2c --version 2>/dev/null | head -1 | awk '{print $3}'), zip, rclone $(rclone --version 2>/dev/null | head -1 | awk '{print $2}')"
          # Enterprise runners (Azure VMs) have no GPU; hwaccel is not available.
          # Decoding and encoding are both CPU-only (software).
          echo "Runner CPU: $(lscpu 2>/dev/null | awk -F: '/Model name/{gsub(/^[ \t]+/,"",$2); print $2}')"
          echo "GPU       : none (Enterprise runner — Azure VM without GPU)"
          echo "::endgroup::"

          echo "::group::GitHub CLI"
          if ! command -v gh &>/dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq > /dev/null
            sudo apt-get install -y -qq gh > /dev/null
            echo "Installed GitHub CLI"
          else
            echo "GitHub CLI already available: $(gh --version | head -1)"
          fi
          echo "::endgroup::"

          ELAPSED=$((SECONDS - PHASE_START))
          echo "::group::Update dashboard"
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩⬜⬜⬜⬜⬜⬜⬜ **1 / 8** — Dependencies installed

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | ${ELAPSED}s — ffmpeg, aria2, zip, rclone, gh |
          | 📁 Directories | ⏳ Running | — |
          | ⬇️ Downloads | ⏳ Pending | — |
          | 🎞️ Processing + 📨 Telegram | ⏳ Pending | — |
          | ☁️ Cloud Upload | ⏳ Pending | — |
          | 📦 Packaging | ⏳ Pending | — |
          | 🚀 Release | ⏳ Pending | — |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Create working directories
        run: |
          echo "::group::Create directories and mount tmpfs"
          mkdir -p downloads processed zips
          # tmpfs only uses RAM for data stored; downloads are deleted after encoding
          echo "Mounting downloads/ on tmpfs (100G)..."
          sudo mount -t tmpfs -o size=100G,noatime tmpfs downloads/
          echo "Mounting processed/ on tmpfs (100G)..."
          sudo mount -t tmpfs -o size=100G,noatime tmpfs processed/
          echo "Directories ready: downloads/ (tmpfs 100G), processed/ (tmpfs 100G), zips/"
          echo "::endgroup::"

          echo "::group::Update dashboard"
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩🟩⬜⬜⬜⬜⬜⬜ **2 / 8** — Directories ready

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | — |
          | 📁 Directories | ✅ Done | full tmpfs (downloads + processed 100G) |
          | ⬇️ Downloads | ⏳ Running | Preparing… |
          | 🎞️ Processing + 📨 Telegram | ⏳ Pending | — |
          | ☁️ Cloud Upload | ⏳ Pending | — |
          | 📦 Packaging | ⏳ Pending | — |
          | 🚀 Release | ⏳ Pending | — |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Download videos
        run: |
          PHASE_START=$SECONDS
          total=$(wc -l < video_urls.txt)

          echo "::group::Build aria2c input file ($total URLs)"
          count=0
          skipped=0
          while IFS='|' read -r url rest || [ -n "$url" ]; do
            count=$((count + 1))
            url=$(echo "$url" | sed -E 's/^[0-9]+\.\s*//')
            if [ -z "$url" ]; then
              skipped=$((skipped + 1))
              continue
            fi
            filename=$(basename "$url")
            unique_name="${count}_${filename}"
            echo "$url"
            echo "  out=${unique_name}"
          done < video_urls.txt > /tmp/aria2_downloads.txt
          echo "Prepared $count URLs ($skipped empty lines skipped)"
          echo "::endgroup::"

          echo "::group::Download with aria2c (64 concurrent, 16 connections/server)"
          aria2c \
            --input-file=/tmp/aria2_downloads.txt \
            --dir=downloads \
            --max-concurrent-downloads=64 \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --disk-cache=1024M \
            --file-allocation=falloc \
            --max-tries=5 \
            --retry-wait=3 \
            --connect-timeout=10 \
            --timeout=120 \
            --max-overall-download-limit=0 \
            --max-download-limit=0 \
            --optimize-concurrent-downloads=true \
            --stream-piece-selector=geom \
            --uri-selector=adaptive \
            --console-log-level=warn \
            --summary-interval=15 \
            --auto-file-renaming=false \
            --allow-overwrite=true 2>&1 || echo "::warning::Some downloads may have failed"
          echo "::endgroup::"

          echo "::group::Validate downloaded files"
          downloaded=$(find downloads -maxdepth 1 -type f | wc -l)
          valid=0
          invalid=0
          for f in downloads/*; do
            [ -f "$f" ] || continue
            fsize=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$fsize" -lt 1024 ]; then
              echo "::warning::File too small (${fsize}B), removing: $(basename "$f")"
              rm -f "$f"
              invalid=$((invalid + 1))
            else
              valid=$((valid + 1))
            fi
          done
          echo "Valid: $valid, Invalid/removed: $invalid, Total downloaded: $downloaded"
          echo "::endgroup::"

          ELAPSED=$((SECONDS - PHASE_START))
          total_size=$(du -sh downloads/ 2>/dev/null | awk '{print $1}')
          total_size=${total_size:-0}
          echo "::group::Update dashboard"
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩🟩🟩⬜⬜⬜⬜⬜ **3 / 8** — Downloads complete

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | — |
          | 📁 Directories | ✅ Done | full tmpfs (downloads + processed 100G) |
          | ⬇️ Downloads | ✅ Done | ${ELAPSED}s — ${valid} files (${total_size}), ${invalid} invalid |
          | 🎞️ Processing + 📨 Telegram | ⏳ Running | 0/${valid} videos… |
          | ☁️ Cloud Upload | ⏳ Pending | — |
          | 📦 Packaging | ⏳ Pending | — |
          | 🚀 Release | ⏳ Pending | — |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Process videos — crop, denoise, sharpen and re-encode (64 vCPUs)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPLOAD_TELEGRAM: ${{ inputs.upload_telegram }}
        run: |
          PHASE_START=$SECONDS

          PARALLEL_JOBS=16
          THREADS_PER_JOB=4

          ENHANCE_FILTERS="hqdn3d=3:2:5:3.5,cas=0.4,eq=contrast=1.03:saturation=1.08"

          # Telegram Bot API file size limit (50 MB)
          TG_MAX_SIZE=$((50 * 1024 * 1024))

          echo "::group::Encoder configuration"
          echo "Encoder  : libx264 preset fast CRF 15 · profile high · tune film"
          echo "Decode   : software (Enterprise runner — no GPU)"
          echo "Workers  : ${PARALLEL_JOBS} jobs × ${THREADS_PER_JOB} threads = 64 vCPUs"
          echo "Filters  : crop (auto 10s) → hqdn3d (denoise) → cas (sharpen) → eq (color)"
          echo "I/O      : full tmpfs (downloads + processed in RAM)"
          echo "::endgroup::"

          # Shared counters for progress tracking (atomic via lock file)
          echo "0" > /tmp/vid_done
          echo "0" > /tmp/vid_errors
          echo "0" > /tmp/tg_uploaded
          echo "0" > /tmp/tg_skipped
          echo "0" > /tmp/tg_errors
          TOTAL_VIDEOS=$(find downloads -maxdepth 1 -type f | wc -l)
          echo "$TOTAL_VIDEOS" > /tmp/vid_total

          process_video() {
            local video="$1"
            local filename
            filename=$(basename "$video")
            local output_name="${filename%.*}.mp4"

            case "${filename,,}" in
              *.mp4|*.mkv|*.avi|*.mov|*.wmv|*.flv|*.webm|*.m4v|*.mpg|*.mpeg) ;;
              *) echo "  Skipping non-video: $filename"; rm -f "$video"; return ;;
            esac

            local vid_start=$SECONDS

            # 1. Probe source dimensions
            src_w=$(ffprobe -v error -analyzeduration 5M -probesize 5M -select_streams v:0 \
              -show_entries stream=width  -of csv=p=0 "$video" 2>/dev/null) || true
            src_h=$(ffprobe -v error -analyzeduration 5M -probesize 5M -select_streams v:0 \
              -show_entries stream=height -of csv=p=0 "$video" 2>/dev/null) || true

            if [ -z "$src_w" ] || [ -z "$src_h" ]; then
              echo "::warning::Cannot probe $filename — skipping"
              (
                flock 9
                echo $(($(cat /tmp/vid_errors) + 1)) > /tmp/vid_errors
              ) 9>/tmp/vid_lock
              rm -f "$video"
              return
            fi

            echo "  ▶ $filename (${src_w}×${src_h})"

            # 2. Cropdetect over first 10 s
            crop_info=$(ffmpeg -nostdin -threads 2 -i "$video" -t 10 -an \
              -vf cropdetect=24:16:0 -f null /dev/null 2>&1 \
              | grep -oP 'crop=[0-9]+:[0-9]+:[0-9]+:[0-9]+' | sort | uniq -c | sort -rn | head -1 \
              | awk '{print $2}' || echo "")

            # 3. Validate crop
            CROP_PREFIX=""
            if [ -n "$crop_info" ]; then
              crop_w=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f1)
              crop_h=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f2)
              crop_x=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f3)
              crop_y=$(echo "$crop_info" | cut -d= -f2 | cut -d: -f4)
              if echo "$crop_w $crop_h $crop_x $crop_y" \
                   | grep -qP '^[0-9]+ [0-9]+ [0-9]+ [0-9]+$' && \
                 [ "$crop_w" -gt 0 ] && [ "$crop_h" -gt 0 ] && \
                 [ "$((crop_x + crop_w))" -le "$src_w" ] && \
                 [ "$((crop_y + crop_h))" -le "$src_h" ]; then
                if [ "$crop_w" != "$src_w" ] || [ "$crop_h" != "$src_h" ] || \
                   [ "$crop_x" != "0" ]       || [ "$crop_y" != "0" ]; then
                  # Ensure even dimensions and offsets (required by yuv420p / x264)
                  crop_w=$((crop_w / 2 * 2))
                  crop_h=$((crop_h / 2 * 2))
                  crop_x=$((crop_x / 2 * 2))
                  crop_y=$((crop_y / 2 * 2))
                  CROP_PREFIX="crop=${crop_w}:${crop_h}:${crop_x}:${crop_y},"
                fi
              fi
            fi

            VF_ARGS="-vf ${CROP_PREFIX}${ENHANCE_FILTERS}"

            echo "    🎬 $filename — encoding…"

            # 4. Encode — output always as .mp4 for correct container format
            # -threads MUST be after -i to apply to the encoder (libx264).
            # Before -i it only sets decoder threads; x264 ignores it and
            # auto-detects (e.g. 22+), causing massive thread oversubscription
            # when running 16 parallel workers (16×22 = 352 threads on 64 cores).
            local logfile="/tmp/ffmpeg_${filename}.log"
            # shellcheck disable=SC2086
            ffmpeg -y -nostdin \
              -i "$video" \
              $VF_ARGS \
              -c:v libx264 -preset fast -crf 15 -threads "${THREADS_PER_JOB}" \
              -profile:v high -level:v 4.1 -tune film \
              -x264-params "aq-mode=3:aq-strength=0.8:psy-rd=1.0,0.15:deblock=-1,-1:rc-lookahead=30:bframes=3:ref=4" \
              -c:a aac -b:a 256k -ar 48000 \
              -pix_fmt yuv420p -movflags +faststart \
              "processed/${output_name}" > /dev/null 2>"$logfile" || {
                echo "::warning::Encode failed for $filename — fallback re-encode (no filters)"
                tail -5 "$logfile" 2>/dev/null || true
                # Fallback: re-encode without enhancement filters to produce a playable MP4
                ffmpeg -y -nostdin -i "$video" \
                  -c:v libx264 -preset ultrafast -crf 23 -threads "${THREADS_PER_JOB}" \
                  -c:a aac -b:a 128k -ar 44100 \
                  -pix_fmt yuv420p -movflags +faststart \
                  "processed/${output_name}" > /dev/null 2>&1 || {
                    echo "::warning::Fallback also failed for $filename — copying original"
                    cp "$video" "processed/${output_name}"
                  }
                (
                  flock 9
                  echo $(($(cat /tmp/vid_errors) + 1)) > /tmp/vid_errors
                ) 9>/tmp/vid_lock
              }
            rm -f "$logfile"

            # 5. Upload to Telegram immediately after encoding (if enabled)
            if [ "$UPLOAD_TELEGRAM" = "yes" ] && [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
              local out_file="processed/${output_name}"
              if [ -f "$out_file" ]; then
                local out_size
                out_size=$(stat -c%s "$out_file" 2>/dev/null || echo 0)
                if [ "$out_size" -gt "$TG_MAX_SIZE" ]; then
                  echo "    📨 $output_name — $(( out_size / 1024 / 1024 ))MB exceeds 50 MB, Telegram skipped"
                  (
                    flock 9
                    echo $(($(cat /tmp/tg_skipped) + 1)) > /tmp/tg_skipped
                  ) 9>/tmp/tg_lock
                else
                  echo "    📨 $output_name — uploading to Telegram…"
                  local tg_response
                  tg_response=$(curl -s -w "\n%{http_code}" -X POST \
                    "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
                    -F "chat_id=${TELEGRAM_CHAT_ID}" \
                    -F "video=@${out_file}" \
                    -F "caption=${output_name}" \
                    -F "supports_streaming=true" \
                    --max-time 600 2>&1) || true
                  local tg_http
                  tg_http=$(echo "$tg_response" | tail -1)
                  local tg_ok
                  tg_ok=$(echo "$tg_response" | sed '$d' | grep -o '"ok":true' || true)
                  if [ -n "$tg_ok" ]; then
                    echo "    📨 ✅ Sent to Telegram"
                    (
                      flock 9
                      echo $(($(cat /tmp/tg_uploaded) + 1)) > /tmp/tg_uploaded
                    ) 9>/tmp/tg_lock
                  else
                    echo "::warning::Telegram upload failed for $output_name (HTTP $tg_http)"
                    (
                      flock 9
                      echo $(($(cat /tmp/tg_errors) + 1)) > /tmp/tg_errors
                    ) 9>/tmp/tg_lock
                  fi
                fi
              fi
            fi

            rm -f "$video"

            local vid_elapsed=$((SECONDS - vid_start))
            (
              flock 9
              done_count=$(($(cat /tmp/vid_done) + 1)); echo "$done_count" > /tmp/vid_done
              total=$(cat /tmp/vid_total)
              echo "  ✓ $filename (${vid_elapsed}s) [$done_count/$total]"
            ) 9>/tmp/vid_lock
          }

          export -f process_video
          export THREADS_PER_JOB ENHANCE_FILTERS UPLOAD_TELEGRAM TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID TG_MAX_SIZE

          echo "::group::Encoding $TOTAL_VIDEOS videos (${PARALLEL_JOBS} parallel workers)"

          # Background heartbeat: prints progress every 60 s so logs never appear stalled
          (
            while sleep 60; do
              _done=$(cat /tmp/vid_done 2>/dev/null || echo 0)
              _total=$(cat /tmp/vid_total 2>/dev/null || echo 0)
              _errors=$(cat /tmp/vid_errors 2>/dev/null || echo 0)
              _pct=0; [ "$_total" -gt 0 ] && _pct=$((_done * 100 / _total))
              _tg_info=""
              if [ "$UPLOAD_TELEGRAM" = "yes" ]; then
                _tg=$(cat /tmp/tg_uploaded 2>/dev/null || echo 0)
                _tg_info=", ${_tg} sent to TG"
              fi
              echo "  ⏱ Heartbeat: ${_done}/${_total} (${_pct}%) encoded, ${_errors} errors${_tg_info} — $(date +%H:%M:%S)"
            done
          ) &
          HEARTBEAT_PID=$!

          find downloads -maxdepth 1 -type f -printf '%s %p\0' | sort -zrn | sed -z 's/^[0-9]* //' | \
            xargs -0 -P "${PARALLEL_JOBS}" -I{} bash -c 'process_video "$@"' _ {}

          kill ${HEARTBEAT_PID:-0} 2>/dev/null || true
          wait ${HEARTBEAT_PID:-0} 2>/dev/null || true
          echo "::endgroup::"

          processed_count=$(ls processed/ 2>/dev/null | wc -l)
          error_count=$(cat /tmp/vid_errors 2>/dev/null || echo 0)
          tg_uploaded=$(cat /tmp/tg_uploaded 2>/dev/null || echo 0)
          tg_skipped=$(cat /tmp/tg_skipped 2>/dev/null || echo 0)
          tg_errors=$(cat /tmp/tg_errors 2>/dev/null || echo 0)
          ELAPSED=$((SECONDS - PHASE_START))

          echo "::group::Processing summary"
          echo "Processed : $processed_count videos"
          echo "Errors    : $error_count"
          echo "Time      : ${ELAPSED}s"
          if [ "$UPLOAD_TELEGRAM" = "yes" ]; then
            echo "Telegram  : ${tg_uploaded} sent, ${tg_skipped} skipped (>50 MB), ${tg_errors} errors"
          fi
          echo "::endgroup::"

          # Write Telegram status for dashboard
          if [ "$UPLOAD_TELEGRAM" = "yes" ]; then
            echo "✅ Done | ${tg_uploaded} sent, ${tg_skipped} skipped (>50 MB), ${tg_errors} errors (inline)" > /tmp/telegram_status.txt
          else
            echo "⏭️ Skipped | telegram=no" > /tmp/telegram_status.txt
          fi

          processed_size=$(du -sh processed/ 2>/dev/null | awk '{print $1}')
          processed_size=${processed_size:-0}
          TELEGRAM_STATUS=$(cat /tmp/telegram_status.txt 2>/dev/null || echo "⏭️ Skipped | —")
          echo "::group::Update dashboard"
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩🟩🟩🟩🟩⬜⬜⬜ **5 / 8** — Encoding + Telegram complete

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | — |
          | 📁 Directories | ✅ Done | full tmpfs (downloads + processed 100G) |
          | ⬇️ Downloads | ✅ Done | — |
          | 🎞️ Processing | ✅ Done | ${ELAPSED}s — ${processed_count} videos (${processed_size}), ${error_count} errors |
          | 📨 Telegram | ${TELEGRAM_STATUS} |
          | ☁️ Cloud Upload | ⏳ Running | Uploading… |
          | 📦 Packaging | ⏳ Pending | — |
          | 🚀 Release | ⏳ Pending | — |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Upload processed MP4s to cloud storage
        if: ${{ inputs.upload_mirror != 'none' && inputs.upload_mirror != '' }}
        env:
          RCLONE_DROPBOX_TOKEN: ${{ secrets.RCLONE_DROPBOX_TOKEN }}
          RCLONE_GDRIVE_TOKEN: ${{ secrets.RCLONE_GDRIVE_TOKEN }}
        run: |
          PHASE_START=$SECONDS
          MIRROR="${{ inputs.upload_mirror }}"
          FOLDER="${{ inputs.cloud_folder }}"
          RCLONE_CONFIG_FILE="/tmp/rclone.conf"
          UPLOAD_ERRORS=0

          # Always remove the rclone config (contains tokens) on exit
          trap 'rm -f "$RCLONE_CONFIG_FILE"' EXIT

          echo "::group::Configure rclone remotes"
          if [ "$MIRROR" = "dropbox" ] || [ "$MIRROR" = "both" ]; then
            if [ -z "$RCLONE_DROPBOX_TOKEN" ]; then
              echo "::error::RCLONE_DROPBOX_TOKEN secret is not set. See docs/CLOUD-STORAGE-SETUP.md"
              exit 1
            fi
            printf '[dropbox]\ntype = dropbox\ntoken = %s\n\n' "$RCLONE_DROPBOX_TOKEN" >> "$RCLONE_CONFIG_FILE"
            echo "Dropbox remote configured"
          fi
          if [ "$MIRROR" = "gdrive" ] || [ "$MIRROR" = "both" ]; then
            if [ -z "$RCLONE_GDRIVE_TOKEN" ]; then
              echo "::error::RCLONE_GDRIVE_TOKEN secret is not set. See docs/CLOUD-STORAGE-SETUP.md"
              exit 1
            fi
            printf '[gdrive]\ntype = drive\nscope = drive\ntoken = %s\n\n' "$RCLONE_GDRIVE_TOKEN" >> "$RCLONE_CONFIG_FILE"
            echo "Google Drive remote configured"
          fi
          echo "::endgroup::"

          mp4_count=$(find processed -maxdepth 1 -name '*.mp4' | wc -l)
          echo "::group::Upload ${mp4_count} MP4 file(s) to mirror=${MIRROR} folder=${FOLDER}"
          if [ "$MIRROR" = "dropbox" ] || [ "$MIRROR" = "both" ]; then
            echo "Uploading to Dropbox:${FOLDER}/ …"
            rclone copy processed/ "dropbox:${FOLDER}/" \
              --config "$RCLONE_CONFIG_FILE" \
              --include '*.mp4' \
              --transfers=8 \
              --stats=30s 2>&1 || { echo "::warning::Dropbox upload failed"; UPLOAD_ERRORS=$((UPLOAD_ERRORS + 1)); }
            echo "Dropbox upload done"
          fi
          if [ "$MIRROR" = "gdrive" ] || [ "$MIRROR" = "both" ]; then
            echo "Uploading to Google Drive:${FOLDER}/ …"
            rclone copy processed/ "gdrive:${FOLDER}/" \
              --config "$RCLONE_CONFIG_FILE" \
              --include '*.mp4' \
              --transfers=8 \
              --stats=30s 2>&1 || { echo "::warning::Google Drive upload failed"; UPLOAD_ERRORS=$((UPLOAD_ERRORS + 1)); }
            echo "Google Drive upload done"
          fi
          echo "::endgroup::"

          # Fail the step if any upload encountered errors
          if [ "$UPLOAD_ERRORS" -gt 0 ]; then
            echo "::error::${UPLOAD_ERRORS} cloud upload(s) failed. Check warnings above."
            exit 1
          fi

          ELAPSED=$((SECONDS - PHASE_START))
          echo "::group::Update dashboard"
          CLOUD_DETAIL="${ELAPSED}s — ${mp4_count} MP4(s) → ${MIRROR}:${FOLDER}/"
          [ "$UPLOAD_ERRORS" -gt 0 ] && CLOUD_DETAIL="${CLOUD_DETAIL} (${UPLOAD_ERRORS} error(s))"
          echo "✅ Done | ${CLOUD_DETAIL}" > /tmp/cloud_status.txt
          TELEGRAM_STATUS=$(cat /tmp/telegram_status.txt 2>/dev/null || echo "⏭️ Skipped | —")
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩🟩🟩🟩🟩🟩⬜⬜ **6 / 8** — Cloud upload complete

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | — |
          | 📁 Directories | ✅ Done | full tmpfs (downloads + processed 100G) |
          | ⬇️ Downloads | ✅ Done | — |
          | 🎞️ Processing | ✅ Done | — |
          | 📨 Telegram | ${TELEGRAM_STATUS} |
          | ☁️ Cloud Upload | ✅ Done | ${CLOUD_DETAIL} |
          | 📦 Packaging | ⏳ Running | Creating zip files… |
          | 🚀 Release | ⏳ Pending | — |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Skip cloud upload (mirror=none)
        if: ${{ inputs.upload_mirror == 'none' || inputs.upload_mirror == '' }}
        run: |
          echo "⏭️ Skipped | mirror=none" > /tmp/cloud_status.txt
          TELEGRAM_STATUS=$(cat /tmp/telegram_status.txt 2>/dev/null || echo "⏭️ Skipped | —")
          echo "::group::Update dashboard"
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩🟩🟩🟩🟩🟩⬜⬜ **6 / 8** — Cloud upload skipped

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | — |
          | 📁 Directories | ✅ Done | full tmpfs (downloads + processed 100G) |
          | ⬇️ Downloads | ✅ Done | — |
          | 🎞️ Processing | ✅ Done | — |
          | 📨 Telegram | ${TELEGRAM_STATUS} |
          | ☁️ Cloud Upload | ⏭️ Skipped | mirror=none |
          | 📦 Packaging | ⏳ Running | Creating zip files… |
          | 🚀 Release | ⏳ Pending | — |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Create zip files with size limit
        run: |
          PHASE_START=$SECONDS

          # GitHub release hard limit is 2 GiB (2147483648 bytes) per file.
          # MAX_SIZE controls how many files are accumulated per zip.
          MAX_SIZE=$((1900 * 1024 * 1024))
          GITHUB_LIMIT=2147483648
          zip_index=1
          current_size=0
          current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"

          echo "::group::Creating zip archives (max ~1.9 GB each)"
          for video in processed/*; do
            [ -f "$video" ] || continue
            file_size=$(stat -c%s "$video")

            # Files that exceed the GitHub limit are split into MAX_SIZE chunks.
            if [ "$file_size" -ge "$GITHUB_LIMIT" ]; then
              echo "  ⚡ Splitting $(basename "$video") ($((file_size / 1024 / 1024))MB) into ~1.9 GB parts..."
              # Close the current accumulation zip before starting split parts.
              if [ "$current_size" -gt 0 ]; then
                zip_index=$((zip_index + 1))
                current_size=0
                current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              fi
              split -b "$MAX_SIZE" "$video" "${video}.part." \
                || { echo "  ❌ ERROR: split failed for $(basename "$video")" >&2; exit 1; }
              for part in "${video}".part.*; do
                part_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
                part_size=$(stat -c%s "$part")
                echo "    $(basename "$part") ($((part_size / 1024 / 1024))MB) → $part_zip"
                zip -j -0 "$part_zip" "$part" > /dev/null
                rm -f "$part"
                zip_index=$((zip_index + 1))
              done
              # Reset accumulation state for subsequent files.
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              rm -f "$video"
              continue
            fi

            if [ "$file_size" -ge "$MAX_SIZE" ]; then
              if [ "$current_size" -gt 0 ]; then
                zip_index=$((zip_index + 1))
              fi
              single_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              echo "  Large file $(basename "$video") → $single_zip"
              zip -j -0 "$single_zip" "$video" > /dev/null
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
              rm -f "$video"
              continue
            fi

            if [ "$current_size" -gt 0 ] && [ $((current_size + file_size)) -ge "$MAX_SIZE" ]; then
              zip_index=$((zip_index + 1))
              current_size=0
              current_zip="zips/videos_part_$(printf '%03d' $zip_index).zip"
            fi

            echo "  $(basename "$video") ($((file_size / 1024 / 1024))MB) → $current_zip"
            zip -j -0 "$current_zip" "$video" > /dev/null
            current_size=$((current_size + file_size))

            rm -f "$video"
          done
          echo "::endgroup::"

          echo "::group::Validating zip sizes (limit: GitHub 2 GiB per file)"
          oversize_found=0
          for z in zips/*.zip; do
            [ -f "$z" ] || continue
            z_bytes=$(stat -c%s "$z")
            if [ "$z_bytes" -ge "$GITHUB_LIMIT" ]; then
              echo "  ❌ $(basename "$z") is ${z_bytes} bytes — exceeds GitHub's 2 GiB upload limit"
              oversize_found=1
            else
              echo "  ✅ $(basename "$z") is ${z_bytes} bytes — OK"
            fi
          done
          if [ "$oversize_found" -eq 1 ]; then
            echo "ERROR: One or more zip files exceed GitHub's 2 GiB upload limit." >&2
            exit 1
          fi
          echo "::endgroup::"

          zip_count=$(ls zips/*.zip 2>/dev/null | wc -l)
          zip_size=$(du -sh zips/ 2>/dev/null | awk '{print $1}')
          zip_size=${zip_size:-0}
          ELAPSED=$((SECONDS - PHASE_START))

          echo "::group::Zip summary"
          echo "Created $zip_count zip file(s) in ${ELAPSED}s:"
          ls -lh zips/
          echo "::endgroup::"

          echo "::group::Update dashboard"
          CLOUD_STATUS=$(cat /tmp/cloud_status.txt 2>/dev/null || echo "⏭️ Skipped | —")
          TELEGRAM_STATUS=$(cat /tmp/telegram_status.txt 2>/dev/null || echo "⏭️ Skipped | —")
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩🟩🟩🟩🟩🟩🟩⬜ **7 / 8** — Zips created

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | — |
          | 📁 Directories | ✅ Done | full tmpfs (downloads + processed 100G) |
          | ⬇️ Downloads | ✅ Done | — |
          | 🎞️ Processing | ✅ Done | — |
          | 📨 Telegram | ${TELEGRAM_STATUS} |
          | ☁️ Cloud Upload | ${CLOUD_STATUS} |
          | 📦 Packaging | ✅ Done | ${ELAPSED}s — ${zip_count} zips (${zip_size}) |
          | 🚀 Release | ⏳ Running | Uploading… |
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Create release and upload zips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PHASE_START=$SECONDS

          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          TAG="videos-${TIMESTAMP}"
          TITLE="Processed Videos - ${TIMESTAMP}"
          zip_count=$(ls zips/*.zip 2>/dev/null | wc -l)
          BODY="Processed ${zip_count} zip parts — Enterprise runner: Ubuntu 24.04 · 64 cores · 256 GB RAM.

          Downloads
          - aria2c: 64 concurrent, 16 connections/server, split=16, falloc
          - downloads/ + processed/ on tmpfs RAM-disk (100 GB each)

          Video processing (16 workers × 4 threads = 64 vCPUs)
          - Software decoding (Enterprise runner — no GPU)
          - Black borders removed (cropdetect, 10 s sample)
          - Noise reduction: hqdn3d (light spatial + moderate temporal)
          - Sharpening: CAS (Contrast Adaptive Sharpen)
          - Color: subtle contrast & saturation boost (eq filter)
          - Encoder: libx264 preset fast CRF 15 · profile high · tune film
          - x264: aq-mode=3, psy-rd=1.0, deblock=-1, ref=4
          - Audio: AAC 256 kbps 48 kHz
          - ZIP parts: max ~1.9 GB each"

          echo "::group::Create GitHub release ($TAG)"
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            zips/*.zip
          echo "::endgroup::"

          ELAPSED=$((SECONDS - PHASE_START))
          echo "::group::Update dashboard"
          CLOUD_STATUS=$(cat /tmp/cloud_status.txt 2>/dev/null || echo "⏭️ Skipped | —")
          TELEGRAM_STATUS=$(cat /tmp/telegram_status.txt 2>/dev/null || echo "⏭️ Skipped | —")
          cat > /tmp/dashboard.md <<EOF
          ## 🎬 Video Processing Dashboard

          🟩🟩🟩🟩🟩🟩🟩🟩 **8 / 8** — Complete ✅

          | Phase | Status | Details |
          |-------|--------|---------|
          | 📦 Dependencies | ✅ Done | — |
          | 📁 Directories | ✅ Done | full tmpfs (downloads + processed 100G) |
          | ⬇️ Downloads | ✅ Done | — |
          | 🎞️ Processing | ✅ Done | — |
          | 📨 Telegram | ${TELEGRAM_STATUS} |
          | ☁️ Cloud Upload | ${CLOUD_STATUS} |
          | 📦 Packaging | ✅ Done | ${zip_count} zip files |
          | 🚀 Release | ✅ Done | ${ELAPSED}s — [\`${TAG}\`](../../releases/tag/${TAG}) |

          ---
          > ✅ **Pipeline complete** — All ${zip_count} zip parts uploaded to release \`${TAG}\`
          EOF
          cp /tmp/dashboard.md "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"
